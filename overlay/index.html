<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>larpsense cloud radar</title>
    <style>
        :root { 
            --wm-scale: 0.85; 
        }
        
        body { 
            background-color: transparent !important; color: #fff; height: 100vh; margin: 0; 
            font-family: 'Verdana', sans-serif; overflow: hidden; position: relative;
        }

        body.edit-mode {
            background-color: rgba(0, 0, 0, 0.4) !important;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }
        body.edit-mode .draggable {
            cursor: move;
        }

        #settings-wrapper {
            position: absolute; top: 20px; right: 20px; z-index: 10001;
        }
        #wm-wrapper {
            position: absolute;
            z-index: 10000;
            width: 0;
            height: 0;
            overflow: visible;
        }
        #radar-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;
        }

        .settings-btn {
            position: absolute; top: 0; right: 0;
            background-color: rgb(17, 17, 17); border: 1px solid rgb(45, 45, 45);
            cursor: pointer; z-index: 10001; 
            width: 28px; height: 28px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: background-color 0.2s, border-color 0.2s;
            padding: 0;
        }
        
        .settings-btn svg {
            width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round; transition: transform 0.3s ease, stroke 0.2s;
        }

        .settings-btn:hover { background-color: rgb(25, 25, 25); border-color: rgb(60, 60, 60); }
        .settings-btn:hover svg { transform: rotate(45deg); stroke: #cccccc; }
        .settings-panel.active ~ .settings-btn svg { transform: rotate(45deg); stroke: #ffffff; }
        .settings-panel.active ~ .settings-btn { background-color: rgb(25, 25, 25); border-color: rgb(60, 60, 60); }

        .settings-panel {
            position: absolute; top: 38px; right: 0;
            background-color: rgb(17, 17, 17); border: 1px solid rgb(45, 45, 45);
            border-radius: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 210px; z-index: 10000; display: none; flex-direction: column;
            font-family: 'Verdana', sans-serif; font-size: 11px; text-shadow: 1px 1px 0px #000;
            user-select: none;
        }
        .settings-panel.active { display: flex; }

        .settings-content { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

        .skeet-label { display: flex; align-items: center; gap: 8px; color: #eeeeee; text-transform: lowercase; cursor: pointer; }
        .skeet-label input { display: none; }
        .skeet-checkbox { width: 10px; height: 10px; background: rgb(10, 10, 10); border: 1px solid rgb(45, 45, 45); border-radius: 2px; position: relative; box-sizing: border-box; }
        .skeet-label input:checked + .skeet-checkbox { background: rgb(100, 100, 100); border-radius: 2px; border-color: rgb(45, 45, 45); }

        .slider-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .slider-title { color: #aaaaaa; text-transform: lowercase; margin-bottom: 2px; }
        
        .slider-container { position: relative; width: 100%; height: 11px; background: rgb(10, 10, 10); border: 1px solid rgb(45, 45, 45); border-radius: 2px; display: flex; align-items: center; overflow: hidden; }
        .slider-val { position: absolute; top: 50%; transform: translate(-100%, -50%); color: #fff; font-size: 9px; z-index: 5; pointer-events: none; letter-spacing: -0.2px; padding-right: 4px; white-space: nowrap; }
        .slider-fill { position: absolute; top: 1px; left: 1px; bottom: 1px; background: rgb(100, 100, 100); width: 0%; z-index: 1; pointer-events: none; border-radius: 1px 0 0 1px; }
        .skeet-slider { -webkit-appearance: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; margin: 0; cursor: pointer; z-index: 2; }
        .skeet-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 4px; height: 11px; }

        .custom-select { position: relative; width: 100%; user-select: none; }
        .custom-select.disabled { pointer-events: none; opacity: 0.4; }

        .select-selected { background-color: rgb(20, 20, 20); border: 1px solid rgb(45, 45, 45); color: #aaaaaa; padding: 4px 6px; font-size: 10px; border-radius: 2px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3); transition: border-color 0.1s, color 0.1s; }
        .select-selected:hover { border-color: rgb(75, 75, 75); color: #cccccc; }
        .select-arrow { width: 0; height: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; border-top: 4px solid #777; transition: transform 0.2s; }
        .custom-select.open .select-arrow { transform: rotate(180deg); border-top-color: #aaa; }
        .custom-select.open .select-selected { border-color: rgb(75, 75, 75); }
        .select-items { position: absolute; background-color: rgb(25, 25, 25); border: 1px solid rgb(45, 45, 45); top: 100%; left: 0; right: 0; z-index: 100; display: none; flex-direction: column; border-radius: 2px; margin-top: 3px; box-shadow: 0 4px 6px rgba(0,0,0,0.6); }
        .custom-select.open .select-items { display: flex; }
        .select-items div { color: #aaaaaa; padding: 5px 6px; cursor: pointer; font-size: 10px; transition: background 0.1s, color 0.1s; }
        .select-items div:hover { background-color: rgb(40, 40, 40); color: #ffffff; }
        .select-items div.active-option { color: #ffffff; background-color: rgb(35, 35, 35); }

        .wm-container { 
            position: absolute;
            right: 0;
            bottom: 0;
            background-color: rgb(17, 17, 17);
            border: 1px solid rgb(45, 45, 45);
            padding: 5px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            z-index: 10000;
            border-radius: 2px;
            transition: opacity 0.4s ease;
            transform: scale(var(--wm-scale));
            transform-origin: right center;
            white-space: nowrap;
        }
        .wm-text { font-size: 12px; color: #ffffff; white-space: nowrap; font-family: 'Verdana', sans-serif; text-shadow: 1px 1px 0px #000; }
        .divider { color: #444; margin: 0 6px; }
        .stat-online { color: #44ff44; font-weight: bold; }
        .stat-offline { color: #ff4444; font-weight: bold; }
        
        .radar-container { 
            position: relative; 
            width: 65vh; 
            height: 65vh; 
            max-width: 800px; 
            max-height: 800px; 
            min-width: 400px; 
            min-height: 400px; 
            background-size: 100% 100%; 
            border-radius: 50%; 
            transition: transform 0.2s ease-out, filter 0.6s ease, opacity 0.6s ease; 
            transform-origin: center center; 
        }
        .radar-container.offline-mode { filter: grayscale(80%) brightness(0.6); }
        .radar-container.is-overlay { background-image: none !important; background-color: transparent !important; box-shadow: none !important; }

        .hero-dot { position: absolute; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); z-index: 1000; transition: left 0.2s linear, top 0.2s linear; background-size: cover; background-color: #111; }
        .enemy-dot { border-color: #cb360f; background-color: #cb360f !important; }
        .ally-dot  { border-color: #c4b9a6; background-color: #c4b9a6 !important; }
        .local-dot { border-color: #ffffff; z-index: 1010; border-width: 3px; }

        .midboss-icon { position: absolute; top: 50%; left: 50%; width: 1000px; height: 950px; background-size: contain; background-repeat: no-repeat; background-position: center center; transform: translate(-49.65%, -50.8%); z-index: 1500; filter: drop-shadow(0 0 6px rgba(0,0,0,0.8)); }
        #mb-timer-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: none; border: none; padding: 0; color: #ffffff; font-family: 'Verdana', sans-serif; font-size: 18px; font-weight: normal; text-shadow: 1px 1px 0px #000; display: none; z-index: 1001; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="settings-wrapper" class="draggable">
        <div class="settings-panel" id="settings">
            <div class="settings-content">
                <div class="slider-wrapper">
                    <div class="slider-title">map version</div>
                    <div class="custom-select" id="map-select">
                        <div class="select-selected"><span id="map-select-text">v2 (colored)</span><span class="select-arrow"></span></div>
                        <div class="select-items"><div data-val="old">v1 (classic)</div><div data-val="new">v2 (colored)</div></div>
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-title">map zoom</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-map-zoom"><span id="val-map-zoom">100</span>%</span>
                        <div class="slider-fill" id="fill-map-zoom"></div>
                        <input type="range" id="cfg-map-zoom" class="skeet-slider" min="50" max="200" value="100">
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-title">radar opacity</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-opacity"><span id="val-opacity">100</span>%</span>
                        <div class="slider-fill" id="fill-opacity"></div>
                        <input type="range" id="cfg-opacity" class="skeet-slider" min="10" max="100" value="100">
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-title">stretch X (horizontal)</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-stretch-x"><span id="val-stretch-x">100</span>%</span>
                        <div class="slider-fill" id="fill-stretch-x"></div>
                        <input type="range" id="cfg-stretch-x" class="skeet-slider" min="50" max="150" value="100">
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-title">stretch Y (vertical)</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-stretch-y"><span id="val-stretch-y">100</span>%</span>
                        <div class="slider-fill" id="fill-stretch-y"></div>
                        <input type="range" id="cfg-stretch-y" class="skeet-slider" min="50" max="150" value="100">
                    </div>
                </div>

                <div class="slider-wrapper">
                    <div class="slider-title">icon size</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-size"><span id="val-size">44</span>px</span>
                        <div class="slider-fill" id="fill-size"></div>
                        <input type="range" id="cfg-size" class="skeet-slider" min="16" max="64" value="44">
                    </div>
                </div>
                
                <div class="slider-wrapper">
                    <div class="slider-title">watermark scale</div>
                    <div class="slider-container">
                        <span class="slider-val" id="wrap-wm"><span id="val-wm">100</span>%</span>
                        <div class="slider-fill" id="fill-wm"></div>
                        <input type="range" id="cfg-wm-scale" class="skeet-slider" min="50" max="150" value="100">
                    </div>
                </div>

                <label class="skeet-label"><input type="checkbox" id="cfg-wm" checked><div class="skeet-checkbox"></div>show watermark</label>
                <label class="skeet-label"><input type="checkbox" id="cfg-ping" checked><div class="skeet-checkbox"></div>show ping</label>
                <label class="skeet-label"><input type="checkbox" id="cfg-age" checked><div class="skeet-checkbox"></div>show data age</label>
                <label class="skeet-label"><input type="checkbox" id="cfg-overlay" checked><div class="skeet-checkbox"></div>overlay mode</label>
                <label class="skeet-label"><input type="checkbox" id="cfg-hide-local"><div class="skeet-checkbox"></div>hide local icon</label>
                <label class="skeet-label"><input type="checkbox" id="cfg-hide-allies"><div class="skeet-checkbox"></div>hide allies</label>
                
                <label class="skeet-label" id="wrap-hide-mb" style="display: none;">
                    <input type="checkbox" id="cfg-hide-mb">
                    <div class="skeet-checkbox"></div>hide midboss icon
                </label>
            </div>
        </div>
        <button class="settings-btn" onclick="document.getElementById('settings').classList.toggle('active')">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div id="wm-wrapper" class="draggable">
        <div class="wm-container" id="wm-bar">
            <div class="wm-text" id="wm-content">larpsense <span class="divider">|</span> <span class="stat-offline">OFFLINE</span></div>
        </div>
    </div>

    <div id="radar-wrapper" class="draggable">
        <div class="radar-container" id="radar">
            <div id="layer-enemies"></div>
            <div id="layer-allies"></div>
            <div id="layer-local"></div>
            <div id="mb-icon-layer"></div>
            <div id="mb-timer-box">MID BOSS</div>
        </div>
    </div>

<script>
    const dbUrl = "https://urlink.firebasedatabase.app/radar.json";
    const CENTER_X = 1210, CENTER_Y = 835;
    const ZOOM_BASE = 185; 

    const BASE_ZOOM = 0.60;
    const BASE_STRETCH_X = 1.17;
    const BASE_STRETCH_Y = 0.83;

    const BASE_ICON_URL = "https://raw.githubusercontent.com/senselesed/dl-radar/main/icons/";
    const MAP_OLD = "https://raw.githubusercontent.com/senselesed/dl-radar/main/maps/oldmap.png"; 
    const MAP_NEW_AMBER = "https://raw.githubusercontent.com/senselesed/dl-radar/main/maps/colormapAmbernew.png"; 
    const MAP_NEW_SAPPHIRE = "https://raw.githubusercontent.com/senselesed/dl-radar/main/maps/colormapSapphirenew.png"; 

    const MB_ICON_COLORED = "https://raw.githubusercontent.com/senselesed/dl-radar/main/maps/midboss.png";
    const MB_ICON_BW = "https://raw.githubusercontent.com/senselesed/dl-radar/main/maps/oldmidboss.png";

    const idToIcon = { 1: "Infernus.png", 2: "Seven.png", 3: "Vindicta.png", 4: "Lady_Geist.png", 6: "Abrams.png", 7: "Wraith.png", 8: "McGinnis.png", 10: "Paradox.png", 11: "Dynamo.png", 12: "Kelvin.png", 13: "Haze.png", 14: "Holliday.png", 15: "Bebop.png", 16: "Calico.png", 17: "Grey_Talon.png", 18: "Mo_&_Krill.png", 19: "Shiv.png", 20: "Ivy.png", 25: "Warden.png", 27: "Yamato.png", 31: "Lash.png", 35: "Viscous.png", 50: "Pocket.png", 52: "Mirage.png", 58: "Vyper.png", 60: "Sinclair.png", 63: "Mina.png", 64: "Drifter.png", 65: "Venator.png", 66: "Victor.png", 67: "Paige.png", 69: "The_Doorman.png", 72: "Billy.png", 76: "Graves.png", 77: "Apollo.png", 79: "Rem.png", 80: "Silver.png", 81: "Celeste.png" };

    let cfg = { size: 44, showWm: true, showPing: true, showAge: true, wmScale: 100, mapVersion: 'new', mapZoom: 100, overlayMode: true, hideMBIcon: false, stretchX: 100, stretchY: 100, hideLocal: false, hideAllies: false, opacity: 100 };

    const mapSelect = document.getElementById('map-select');
    const mapSelectText = document.getElementById('map-select-text');
    const mapOptions = mapSelect.querySelectorAll('.select-items div');

    mapSelect.querySelector('.select-selected').addEventListener('click', (e) => {
        e.stopPropagation(); mapSelect.classList.toggle('open');
    });
    document.addEventListener('click', () => mapSelect.classList.remove('open'));

    mapOptions.forEach(opt => {
        opt.addEventListener('click', () => {
            cfg.mapVersion = opt.getAttribute('data-val');
            applyAll(); save();
        });
    });

    function updateSliderVisual(inputId, fillId, wrapId) {
        const input = document.getElementById(inputId);
        const fill = document.getElementById(fillId);
        const wrap = document.getElementById(wrapId);
        const percent = ((input.value - input.min) / (input.max - input.min)) * 100;
        fill.style.width = `calc(${percent}% - 2px)`;
        wrap.style.left = `${percent}%`;
        if (percent < 25) { wrap.style.transform = "translate(4px, -50%)"; wrap.style.left = "0%"; } 
        else { wrap.style.transform = "translate(-100%, -50%)"; }
    }

    function applyAll() {
        if(cfg.mapZoom === undefined) cfg.mapZoom = 100;
        if(cfg.stretchX === undefined) cfg.stretchX = 100;
        if(cfg.stretchY === undefined) cfg.stretchY = 100;
        if(cfg.opacity === undefined) cfg.opacity = 100;
        
        if (cfg.overlayMode) {
            cfg.mapVersion = 'new';
            document.getElementById('map-select').classList.add('disabled');
        } else {
            document.getElementById('map-select').classList.remove('disabled');
        }

        document.getElementById('val-size').innerText = cfg.size;
        document.getElementById('val-wm').innerText = cfg.wmScale;
        document.getElementById('val-map-zoom').innerText = cfg.mapZoom;
        document.getElementById('val-stretch-x').innerText = cfg.stretchX;
        document.getElementById('val-stretch-y').innerText = cfg.stretchY;
        document.getElementById('val-opacity').innerText = cfg.opacity;
        
        document.getElementById('cfg-hide-local').checked = cfg.hideLocal;
        document.getElementById('cfg-hide-allies').checked = cfg.hideAllies;

        document.getElementById('radar').style.opacity = cfg.opacity / 100;
        
        mapOptions.forEach(opt => {
            if (opt.getAttribute('data-val') === cfg.mapVersion) {
                mapSelectText.innerText = opt.innerText;
                opt.classList.add('active-option');
            } else opt.classList.remove('active-option');
        });

        updateSliderVisual('cfg-size', 'fill-size', 'wrap-size');
        updateSliderVisual('cfg-wm-scale', 'fill-wm', 'wrap-wm');
        updateSliderVisual('cfg-map-zoom', 'fill-map-zoom', 'wrap-map-zoom');
        updateSliderVisual('cfg-stretch-x', 'fill-stretch-x', 'wrap-stretch-x');
        updateSliderVisual('cfg-stretch-y', 'fill-stretch-y', 'wrap-stretch-y');
        updateSliderVisual('cfg-opacity', 'fill-opacity', 'wrap-opacity');

        const actualZoom = (cfg.mapZoom / 100) * BASE_ZOOM;
        const actualStretchX = (cfg.stretchX / 100) * BASE_STRETCH_X;
        const actualStretchY = (cfg.stretchY / 100) * BASE_STRETCH_Y;
        
        document.getElementById('radar').style.transform = `scale(${actualZoom}) scaleX(${actualStretchX}) scaleY(${actualStretchY})`;

        const finalScale = (cfg.wmScale / 100) * 0.85;
        document.documentElement.style.setProperty('--wm-scale', finalScale);
        document.getElementById('wm-wrapper').style.display = cfg.showWm ? 'flex' : 'none';
        updateIconSizes();

        document.body.classList.toggle('is-overlay', cfg.overlayMode);
        document.getElementById('radar').classList.toggle('is-overlay', cfg.overlayMode);
        
        document.getElementById('wrap-hide-mb').style.display = cfg.overlayMode ? 'flex' : 'none';
    }

    function save() { localStorage.setItem('larpsense_cfg_v3', JSON.stringify(cfg)); }
    function load() {
        const s = localStorage.getItem('larpsense_cfg_v3');
        if (s) { 
            const parsed = JSON.parse(s);
            cfg = { ...cfg, ...parsed };
            document.getElementById('cfg-size').value = cfg.size;
            document.getElementById('cfg-wm-scale').value = cfg.wmScale;
            document.getElementById('cfg-map-zoom').value = cfg.mapZoom;
            document.getElementById('cfg-opacity').value = cfg.opacity;
            
            if (document.getElementById('cfg-stretch-x')) document.getElementById('cfg-stretch-x').value = cfg.stretchX;
            if (document.getElementById('cfg-stretch-y')) document.getElementById('cfg-stretch-y').value = cfg.stretchY;

            document.getElementById('cfg-wm').checked = cfg.showWm;
            document.getElementById('cfg-ping').checked = cfg.showPing;
            document.getElementById('cfg-age').checked = cfg.showAge;
            if(document.getElementById('cfg-overlay')) document.getElementById('cfg-overlay').checked = cfg.overlayMode;
            if(document.getElementById('cfg-hide-mb')) document.getElementById('cfg-hide-mb').checked = cfg.hideMBIcon;
        }
        applyAll();
    }

    document.getElementById('cfg-map-zoom').addEventListener('input', (e) => { cfg.mapZoom = e.target.value; applyAll(); });
    document.getElementById('cfg-map-zoom').addEventListener('change', save);
    
    document.getElementById('cfg-stretch-x').addEventListener('input', (e) => { cfg.stretchX = e.target.value; applyAll(); });
    document.getElementById('cfg-stretch-x').addEventListener('change', save);

    document.getElementById('cfg-stretch-y').addEventListener('input', (e) => { cfg.stretchY = e.target.value; applyAll(); });
    document.getElementById('cfg-stretch-y').addEventListener('change', save);

    document.getElementById('cfg-size').addEventListener('input', (e) => { cfg.size = e.target.value; applyAll(); });
    document.getElementById('cfg-size').addEventListener('change', save);
    
    document.getElementById('cfg-wm-scale').addEventListener('input', (e) => { cfg.wmScale = e.target.value; applyAll(); });
    document.getElementById('cfg-wm-scale').addEventListener('change', save);
    
    document.getElementById('cfg-opacity').addEventListener('input', (e) => { cfg.opacity = e.target.value; applyAll(); });
    document.getElementById('cfg-opacity').addEventListener('change', save);
    
    document.getElementById('cfg-wm').addEventListener('change', (e) => { cfg.showWm = e.target.checked; applyAll(); save(); });
    document.getElementById('cfg-ping').addEventListener('change', (e) => { cfg.showPing = e.target.checked; save(); });
    document.getElementById('cfg-age').addEventListener('change', (e) => { cfg.showAge = e.target.checked; save(); });
    
    document.getElementById('cfg-overlay').addEventListener('change', (e) => { 
        cfg.overlayMode = e.target.checked; 
        if (!cfg.overlayMode) {
            cfg.hideMBIcon = false;
            document.getElementById('cfg-hide-mb').checked = false;
        } else {
            cfg.mapVersion = 'new';
        }
        applyAll(); save(); 
    });

    document.getElementById('cfg-hide-local').addEventListener('change', (e) => { cfg.hideLocal = e.target.checked; save(); });
    document.getElementById('cfg-hide-allies').addEventListener('change', (e) => { cfg.hideAllies = e.target.checked; save(); });

    document.getElementById('cfg-hide-mb').addEventListener('change', (e) => { 
        cfg.hideMBIcon = e.target.checked; 
        applyAll(); save(); 
    });

    function calculatePos(gx, gy, currentZoom) {
        const px = 300 + (gx - CENTER_X) / (currentZoom / 300);
        const py = 300 + (gy - CENTER_Y) / (currentZoom / 300);
        return { x: (px / 600) * 100, y: (py / 600) * 100 };
    }

    function updateIconSizes() {
        document.querySelectorAll('.hero-dot').forEach(dot => {
            let s = Number(cfg.size); if (dot.classList.contains('local-dot')) s += 6;
            dot.style.width = s + 'px'; 
            dot.style.height = s + 'px';
            dot.style.transform = `translate(-50%, -50%)`;
        });
    }

    function updateLayer(layerId, data, className, isOnline, currentZoom) {
        const container = document.getElementById(layerId);
        const players = (isOnline && data) ? (Array.isArray(data) ? data : [data]) :[];
        while (container.children.length < players.length) {
            const div = document.createElement("div"); div.className = "hero-dot " + className;
            container.appendChild(div);
        }
        while (container.children.length > players.length) container.lastChild.remove();
        
        players.forEach((p, i) => {
            const dot = container.children[i]; 
            const pos = calculatePos(p.x, p.y, currentZoom);
            dot.style.left = pos.x + "%"; dot.style.top = pos.y + "%";
            
            let s = Number(cfg.size); if (className === 'local-dot') s += 6;
            dot.style.width = s + "px"; dot.style.height = s + "px";
            dot.style.transform = `translate(-50%, -50%)`;
            
            if (p.id && idToIcon[p.id]) dot.style.backgroundImage = `url('${BASE_ICON_URL}${idToIcon[p.id]}')`;
        });
    }

    async function tick() {
        const start = Date.now(); let isOnline = false;
        try {
            const res = await fetch(dbUrl + "?t=" + start);
            const data = await res.json();
            if (data && data.sent_at) {
                const diff = (Math.floor(Date.now() / 1000) - data.sent_at).toFixed(1);
                isOnline = diff < 7;
                
                let activeMapImg = MAP_OLD;
                if (cfg.mapVersion === 'new') {
                    const isSapphire = data.is_sapphire || false;
                    activeMapImg = isSapphire ? MAP_NEW_SAPPHIRE : MAP_NEW_AMBER;
                }

                const radar = document.getElementById("radar");
                radar.classList.toggle("offline-mode", !isOnline);
                
                const actualZoom = (cfg.mapZoom / 100) * BASE_ZOOM;
                const actualStretchX = (cfg.stretchX / 100) * BASE_STRETCH_X;
                const actualStretchY = (cfg.stretchY / 100) * BASE_STRETCH_Y;

                radar.style.transform = `scale(${actualZoom}) scaleX(${actualStretchX}) scaleY(${actualStretchY})`; 
                radar.style.backgroundImage = `url('${activeMapImg}')`;

                updateLayer("layer-enemies", data.enemies, "enemy-dot", isOnline, ZOOM_BASE);
                updateLayer("layer-allies", data.allies, "ally-dot", isOnline && !cfg.hideAllies, ZOOM_BASE);
                updateLayer("layer-local", data.local, "local-dot", isOnline && !cfg.hideLocal, ZOOM_BASE);

                const timerBox = document.getElementById('mb-timer-box');
                const iconLayer = document.getElementById('mb-icon-layer');
                
                if (data.mb && isOnline) {
                    if (data.mb.a) {
                        timerBox.style.display = 'none';
                        if (cfg.overlayMode && cfg.hideMBIcon) {
                            iconLayer.innerHTML = '';
                        } else {
                            const activeMBIcon = (cfg.mapVersion === 'new') ? MB_ICON_COLORED : MB_ICON_BW;
                            iconLayer.innerHTML = `<div class="midboss-icon" style="background-image: url('${activeMBIcon}');"></div>`;
                        }
                    } else if (data.mb.rem > 0) {
                        let m = Math.floor(data.mb.rem / 60);
                        let s = Math.floor(data.mb.rem % 60);
                        timerBox.innerText = `\n                        ${m}:${s.toString().padStart(2, '0')}`;
                        timerBox.style.display = 'block';
                        iconLayer.innerHTML = '';
                    } else {
                        timerBox.style.display = 'none';
                        iconLayer.innerHTML = '';
                    }
                } else {
                    timerBox.style.display = 'none';
                    iconLayer.innerHTML = '';
                }

                let wmText = `larpsense <span class="divider">|</span> ${isOnline ? '<span class="stat-online">ONLINE</span>' : '<span class="stat-offline">OFFLINE</span>'}`;
                if (isOnline) {
                    if (cfg.showPing) wmText += ` <span class="divider">|</span> PING: ${Date.now() - start}ms`;
                    if (cfg.showAge) wmText += ` <span class="divider">|</span> DATA AGE: ${diff}s`;
                }
                document.getElementById("wm-content").innerHTML = wmText;
            }
        } catch(e) {}
        setTimeout(tick, isOnline ? 500 : 5000);
    }

    load();
    tick();

    function makeDraggable(wrapperId) {
        const el = document.getElementById(wrapperId);
        let isDragging = false;
        let hasMoved = false;
        let startX, startY, initialLeft, initialTop;

        const saved = localStorage.getItem('pos_' + wrapperId);
        if (saved) {
            const { left, top } = JSON.parse(saved);
            el.style.left = left;
            el.style.top = top;
            el.style.transform = 'none';
            el.style.right = 'auto';
            el.style.bottom = 'auto';
        }

        el.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.closest('.select-items') || e.target.closest('.slider-container')) return;

            isDragging = true;
            hasMoved = false;
            startX = e.clientX;
            startY = e.clientY;

            const rect = el.getBoundingClientRect();
            initialLeft = rect.left;
            initialTop = rect.top;

            el.style.transform = 'none';
            el.style.right = 'auto';
            el.style.bottom = 'auto';
            el.style.left = initialLeft + 'px';
            el.style.top = initialTop + 'px';
            
            if (wrapperId !== 'settings-wrapper') {
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;

            el.style.left = (initialLeft + dx) + 'px';
            el.style.top = (initialTop + dy) + 'px';
        });

        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                if (hasMoved) {
                    localStorage.setItem('pos_' + wrapperId, JSON.stringify({
                        left: el.style.left,
                        top: el.style.top
                    }));
                }
            }
        });

        el.addEventListener('click', (e) => {
            if (hasMoved) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);
    }

    makeDraggable('settings-wrapper');
    makeDraggable('wm-wrapper');
    makeDraggable('radar-wrapper');

</script>
