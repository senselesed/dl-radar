<script>
    // ТВОЯ ССЫЛКА (Проверь, что в конце есть .json)
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const radar = document.getElementById("radar");
    const statusText = document.getElementById("status");

    const MAP_BOUNDS = 16000; 

    async function fetchRadarData() {
        try {
            // Добавляем случайный параметр, чтобы избежать кэширования старой ошибки
            const response = await fetch(dbUrl + "?t=" + Date.now());
            
            if (!response.ok) {
                statusText.innerText = "Ошибка сервера: " + response.status;
                return;
            }

            const data = await response.json();
            radar.innerHTML = ""; 
            
            if (data === null) {
                statusText.innerText = "В базе пусто (null). Скрипт в игре не шлет данные.";
                return;
            }

            // Firebase может вернуть или массив [], или объект {}
            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            let count = 0;
            enemiesArray.forEach(enemy => {
                // Проверяем, что в объекте есть координаты
                if (enemy && typeof enemy.x === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";

                    // Расчет позиции
                    let posX = ((enemy.x + MAP_BOUNDS) / (MAP_BOUNDS * 2)) * 100;
                    let posY = ((MAP_BOUNDS - enemy.y) / (MAP_BOUNDS * 2)) * 100;

                    dot.style.left = Math.max(0, Math.min(100, posX)) + "%";
                    dot.style.top = Math.max(0, Math.min(100, posY)) + "%";
                    
                    radar.appendChild(dot);
                    count++;
                }
            });
            
            statusText.innerText = "Врагов: " + count + " | Обновлено: " + new Date().toLocaleTimeString();

        } catch (err) {
            console.error("Full error info:", err);
            statusText.innerText = "Критическая ошибка: " + err.message;
        }
    }

    // Запуск цикла
    setInterval(fetchRadarData, 1000);
    fetchRadarData();
</script>
