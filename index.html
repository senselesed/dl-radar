<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .radar-container {
            position: relative;
            width: 600px;
            height: 600px;
            background-color: #1e1e1e;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .enemy-dot {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #ff0000;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red;
            z-index: 9999;
        }
        .status {
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Cloud Radar</h2>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Загрузка...</div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const radar = document.getElementById("radar");
    const statusText = document.getElementById("status");

// --- ФИНАЛЬНАЯ ГРАНД-КАЛИБРОВКА ---
    
    // Мы уменьшаем ZOOM с 18000 до 3500. 
    // Это заставит точки "разбежаться" из кучи по всему радару.
    let ZOOM = 3500; 

    // Центрируем по тем координатам, которые у тебя на скрине.
    let CENTER_X = 1200; 
    let CENTER_Y = 1000; 
    
    // ----------------------------------

    async function fetchRadarData() {
        try {
            const response = await fetch(dbUrl + "?t=" + Date.now());
            const data = await response.json();
            radar.innerHTML = ""; 
            
            if (!data) return;
            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            enemiesArray.forEach(enemy => {
                if (enemy && typeof enemy.x === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";

                    // Формула центрирования
                    let posX = 50 + ((enemy.x - CENTER_X) / (ZOOM * 2)) * 100;
                    let posY = 50 - ((enemy.y - CENTER_Y) / (ZOOM * 2)) * 100;

                    // Ограничиваем, чтобы не вылезали за края
                    dot.style.left = Math.max(0, Math.min(100, posX)) + "%";
                    dot.style.top = Math.max(0, Math.min(100, posY)) + "%";
                    
                    radar.appendChild(dot);
                }
            });
            
            // Выводим координаты первого врага для контроля
            if (enemiesArray[0]) {
                statusText.innerText = `Врагов: ${enemiesArray.length} | Текущие X: ${Math.round(enemiesArray[0].x)} Y: ${Math.round(enemiesArray[0].y)}`;
            }
        } catch (err) {
            statusText.innerText = "Ошибка получения данных";
        }
    }

    setInterval(fetchRadarData, 500);
</script>
</body>
</html>
