<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar</title>
    <style>
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .radar-container { 
            position: relative; 
            width: 600px; 
            height: 600px; 
            background-color: #1e1e1e; 
            border: 2px solid #444; 
            border-radius: 8px; 
            overflow: hidden; 
        }
        /* Центральное перекрестие для калибровки */
        .radar-container::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
        .radar-container::after { content: ''; position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.1); }
        
        .enemy-dot { 
            position: absolute; 
            width: 12px; 
            height: 12px; 
            background-color: #ff0000; 
            border: 2px solid white; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); /* Центрирует саму точку */
            box-shadow: 0 0 10px red; 
            z-index: 9999; 
        }
        .status { margin-top: 15px; color: #888; font-size: 14px; background: #1e1e1e; padding: 10px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <h2>Cloud Radar</h2>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Загрузка...</div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    
    // --- НАСТРОЙКИ ---
    const VERSION = "FIX_7"; // Меняй при каждом сохранении!
    const ZOOM = 400;       // Попробуй поставить 800, если не разлетаются
    const CENTER_X = 1230;   
    const CENTER_Y = 930;
    // -----------------

    async function fetchRadarData() {
        try {
            const response = await fetch(dbUrl + "?t=" + Date.now());
            const data = await response.json();
            const radar = document.getElementById("radar");
            const statusText = document.getElementById("status");
            
            radar.innerHTML = ""; 
            if (!data) return;

            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            enemiesArray.forEach(enemy => {
                if (enemy && typeof enemy.x === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";
                    
                    // НОВАЯ ПРЯМАЯ МАТЕМАТИКА
                    // Вычисляем отклонение от центра в пикселях (300 - это половина 600px радара)
                    let x_offset_px = (enemy.x - CENTER_X) / (ZOOM / 300);
                    let y_offset_px = (enemy.y - CENTER_Y) / (ZOOM / 300);

                    let final_x = 300 + x_offset_px;
                    let final_y = 300 - y_offset_px; // Инверсия Y для корректного отображения

                    dot.style.left = final_x + "px";
                    dot.style.top = final_y + "px";
                    
                    radar.appendChild(dot);
                }
            });
            
            if (enemiesArray[0]) {
                statusText.innerHTML = `
                    <b>Версия:</b> ${VERSION} | <b>Zoom:</b> ${ZOOM} <br>
                    <b>Координаты первого врага в базе:</b> X: ${Math.round(enemiesArray[0].x)} Y: ${Math.round(enemiesArray[0].y)}
                `;
            }
        } catch (err) { console.error(err); }
    }

    setInterval(fetchRadarData, 500);
    fetchRadarData();
</script>
</body>
</html>
