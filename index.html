<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .radar-container {
            position: relative;
            width: 600px;
            height: 600px;
            background-color: #1e1e1e; /* Поменяй на #0000ff для теста кэша */
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .enemy-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #ff0000;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red;
            z-index: 9999;
        }
        .status {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>Cloud Radar</h2>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Инициализация...</div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const radar = document.getElementById("radar");
    const statusText = document.getElementById("status");

    async function fetchRadarData() {
        // --- НАСТРОЙКИ ВНУТРИ ФУНКЦИИ (ЧТОБЫ ТОЧНО ОБНОВЛЯЛИСЬ) ---
        
        const ZOOM = 30000;      // Чем МЕНЬШЕ, тем ДАЛЬШЕ враги друг от друга
        const CENTER_X = 1230;  // Твой X из игры
        const CENTER_Y = 1030;  // Твой Y из игры
        
        // -------------------------------------------------------

        try {
            const response = await fetch(dbUrl + "?nocache=" + Date.now());
            const data = await response.json();
            
            radar.innerHTML = ""; 
            
            if (!data) {
                statusText.innerText = "База пуста. Ждем данных...";
                return;
            }

            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            enemiesArray.forEach(enemy => {
                if (enemy && typeof enemy.x === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";

                    // Расчет позиции в процентах
                    let posX = 50 + ((enemy.x - CENTER_X) / (ZOOM * 2)) * 100;
                    let posY = 50 - ((enemy.y - CENTER_Y) / (ZOOM * 2)) * 100;

                    // Отрисовка
                    dot.style.left = posX + "%";
                    dot.style.top = posY + "%";
                    
                    radar.appendChild(dot);
                }
            });
            
            if (enemiesArray[0]) {
                // Добавили ZOOM в текст, чтобы ты видел, применились ли изменения
                statusText.innerHTML = `
                    <b>Врагов:</b> ${enemiesArray.length} | 
                    <b>Zoom:</b> ${ZOOM} | 
                    <b>X:</b> ${Math.round(enemiesArray[0].x)} <b>Y:</b> ${Math.round(enemiesArray[0].y)}
                `;
            }
        } catch (err) {
            statusText.innerText = "Ошибка сети или Firebase";
            console.error(err);
        }
    }

    // Запускаем сразу и потом каждые 500мс
    fetchRadarData();
    setInterval(fetchRadarData, 500);
</script>
</body>
</html>
