<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .radar-container {
            position: relative;
            width: 600px;
            height: 600px;
            background-color: #1e1e1e;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .enemy-dot {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #ff0000;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px red;
            z-index: 9999;
        }
        .status {
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Cloud Radar</h2>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Загрузка...</div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const radar = document.getElementById("radar");
    const statusText = document.getElementById("status");

    // --- НАСТРОЙКИ КАЛИБРОВКИ ---
    let ZOOM = 1;  
    let CENTER_X = 1200; // Подставил твой X из логов
    let CENTER_Y = -1200; // Подставил твой Y из логов
    // ----------------------------

    async function fetchRadarData() {
        try {
            const response = await fetch(dbUrl + "?t=" + Date.now());
            
            if (!response.ok) {
                statusText.innerText = "Ошибка Firebase: " + response.status;
                return;
            }

            const data = await response.json();
            radar.innerHTML = ""; 
            
            if (data === null) {
                statusText.innerText = "База пуста (null)";
                return;
            }

            // Важно: Firebase может вернуть данные в разном формате, обрабатываем оба
            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            let count = 0;
            enemiesArray.forEach(enemy => {
                if (enemy && typeof enemy.x === 'number' && typeof enemy.y === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";

                    // Расчет позиции относительно центра
                    let posX = 50 + ((enemy.x - CENTER_X) / (ZOOM * 2)) * 100;
                    let posY = 50 - ((enemy.y - CENTER_Y) / (ZOOM * 2)) * 100;

                    dot.style.left = Math.max(0, Math.min(100, posX)) + "%";
                    dot.style.top = Math.max(0, Math.min(100, posY)) + "%";
                    
                    radar.appendChild(dot);
                    count++;
                }
            });

            if (count > 0) {
                statusText.innerText = `Врагов: ${count} | X: ${enemiesArray[0].x.toFixed(0)} Y: ${enemiesArray[0].y.toFixed(0)}`;
            } else {
                statusText.innerText = "Врагов нет в радиусе/данные неверны";
            }

        } catch (err) {
            // Теперь мы увидим реальную причину ошибки в статусе
            statusText.innerText = "Ошибка: " + err.message;
            console.error(err);
        }
    }

    // Интервал 500мс для плавности
    setInterval(fetchRadarData, 500);
    fetchRadarData(); 
</script>
</body>
</html>
