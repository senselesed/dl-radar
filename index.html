<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar[FINAL]</title>
    <style>
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .radar-container { 
            position: relative; width: 600px; height: 600px; 
            /* Ссылка на твою новую карту в GitHub */
            background-image: url('https://raw.githubusercontent.com/senselesed/dl-radar/main/map.png');
            background-size: 100% 100%; border: 2px solid #444; border-radius: 8px; overflow: hidden; 
        }
        .dot {
            position: absolute; width: 32px; height: 32px; 
            border: 2px solid white; border-radius: 50%; 
            transform: translate(-50%, -50%); z-index: 1000; 
            transition: left 0.1s linear, top 0.1s linear; /* Плавность 0.2с под стать скрипту */
            background-size: cover; background-position: center; background-color: #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; text-shadow: 1px 1px 2px black; font-weight: bold;
        }
        .enemy-dot { border-color: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .ally-dot  { border-color: #44ff44; box-shadow: 0 0 8px #44ff44; }
        .local-dot { border-color: #f4d3ff; width: 40px; height: 40px; z-index: 1001; box-shadow: 0 0 12px #ffff44; }
        .status { margin-top: 15px; color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <div class="radar-container" id="radar">
        <div id="layer-enemies"></div>
        <div id="layer-allies"></div>
        <div id="layer-local"></div>
    </div>
    <div class="status" id="status">Радар работает...</div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const CENTER_X = 1250, CENTER_Y = 870, ZOOM = 210;
    const BASE_ICON_URL = "https://raw.githubusercontent.com/senselesed/dl-radar/main/icons/";

    // Полная база всех существующих героев с новыми ID
    const idToIcon = {
        1: "Infernus.png", 2: "Seven.png", 3: "Vindicta.png", 4: "Lady_Geist.png",
        6: "Abrams.png", 7: "Wraith.png", 8: "McGinnis.png", 10: "Paradox.png",
        11: "Dynamo.png", 12: "Kelvin.png", 13: "Haze.png", 14: "Holliday.png",
        15: "Bebop.png", 16: "Calico.png", 17: "Grey_Talon.png", 18: "Mo_&_Krill.png",
        19: "Shiv.png", 20: "Ivy.png", 25: "Warden.png", 27: "Yamato.png",
        31: "Lash.png", 35: "Viscous.png", 50: "Pocket.png", 52: "Mirage.png",
        58: "Vyper.png", 60: "Sinclair.png", 63: "Mina.png", 64: "Drifter.png", 
        65: "Venator.png", 66: "Victor.png", 67: "Paige.png", 69: "The_Doorman.png",
        72: "Billy.png", 76: "Graves.png", 77: "Apollo.png", 79: "Rem.png", 
        80: "Silver.png", 81: "Celeste.png"
    };

    const heroIcons = {
        "abrams": "Abrams.png", "apollo": "Apollo.png", "bebop": "Bebop.png", "billy": "Billy.png", 
        "calico": "Calico.png", "celeste": "Celeste.png", "drifter": "Drifter.png", "dynamo": "Dynamo.png", 
        "graves": "Graves.png", "talon": "Grey_Talon.png", "haze": "Haze.png", "holliday": "Holliday.png", 
        "infernus": "Infernus.png", "ivy": "Ivy.png", "kelvin": "Kelvin.png", "geist": "Lady_Geist.png", 
        "lash": "Lash.png", "mcginnis": "McGinnis.png", "mina": "Mina.png", "mirage": "Mirage.png", 
        "krill": "Mo_&_Krill.png", "paige": "Paige.png", "paradox": "Paradox.png", "pocket": "Pocket.png", 
        "rem": "Rem.png", "seven": "Seven.png", "shiv": "Shiv.png", "silver": "Silver.png", 
        "sinclair": "Sinclair.png", "doorman": "The_Doorman.png", "venator": "Venator.png", 
        "victor": "Victor.png", "vindicta": "Vindicta.png", "viscous": "Viscous.png", "vyper": "Vyper.png", 
        "warden": "Warden.png", "wraith": "Wraith.png", "yamato": "Yamato.png"
    };

    function calculatePos(gx, gy) {
        return {
            x: 325 + (gx - CENTER_X) / (ZOOM / 300),
            y: 320 + (gy - CENTER_Y) / (ZOOM / 300)
        };
    }

    function updateLayer(layerId, data, className) {
        const container = document.getElementById(layerId);
        const players = data ? (Array.isArray(data) ? data : [data]) :[];
        
        while (container.children.length < players.length) {
            const div = document.createElement("div");
            div.className = "dot " + className;
            container.appendChild(div);
        }
        while (container.children.length > players.length) {
            container.lastChild.remove();
        }

        players.forEach((p, i) => {
            const dot = container.children[i];
            const pos = calculatePos(p.x, p.y);
            dot.style.left = pos.x + "px";
            dot.style.top = pos.y + "px";
            
            let foundIcon = idToIcon[p.id];

            if (!foundIcon) {
                const searchStr = ((p.model || "") + " " + (p.vdata || "")).toLowerCase();
                for (let key in heroIcons) {
                    if (searchStr.includes(key)) {
                        foundIcon = heroIcons[key];
                        break;
                    }
                }
            }

            if (foundIcon) {
                dot.style.backgroundImage = `url('${BASE_ICON_URL}${foundIcon}')`;
                dot.innerText = "";
            } else {
                dot.style.backgroundImage = "none";
                dot.innerText = p.id || "?";
            }
        });
    }

    async function tick() {
        try {
            const res = await fetch(dbUrl + "?t=" + Date.now());
            const data = await res.json();
            if (!data) return;

            updateLayer("layer-enemies", data.enemies ||[], "enemy-dot");
            updateLayer("layer-allies", data.allies ||[], "ally-dot");
            
            if (data.local) {
                updateLayer("layer-local", [data.local], "local-dot");
            } else {
                updateLayer("layer-local",[], "local-dot");
            }

            document.getElementById("status").innerText = "larpsense alpha: Connected";
        } catch(e) { 
            console.error(e); 
        }
    }

    setInterval(tick, 500);
</script>
</body>
</html>
