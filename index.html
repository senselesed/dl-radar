<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Cloud Radar</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .radar-container {
            position: relative;
            width: 600px;
            height: 600px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            /* Если есть картинка миникарты, раскомментируй строку ниже и положи map.png рядом */
            /* background-image: url('map.png'); */
            background-size: cover;
            overflow: hidden;
        }
        .enemy-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: #ff3b30;
            border: 2px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff3b30;
            transition: left 0.3s linear, top 0.3s linear;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Cloud Radar</h2>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Подключение к базе данных...</div>

    <script>
        // СЮДА ВСТАВЬ ТУ ЖЕ ССЫЛКУ ИЗ FIREBASE
        const dbUrl = "https://ТВОЙ-FIREBASE-ПРОЕКТ.firebasedatabase.app/radar.json";
        const radar = document.getElementById("radar");
        const statusText = document.getElementById("status");

        async function fetchRadarData() {
            try {
                const response = await fetch(dbUrl);
                if (!response.ok) throw new Error("Ошибка сети");
                
                const data = await response.json();
                
                // Очищаем старые точки
                radar.innerHTML = "";
                
                if (data && Array.isArray(data)) {
                    data.forEach(enemy => {
                        const dot = document.createElement("div");
                        dot.className = "enemy-dot";
                        
                        // utils.world_to_map в API обычно отдает значения от 0.0 до 1.0
                        // Умножаем на 100, чтобы получить проценты CSS
                        dot.style.left = (enemy.x * 100) + "%";
                        dot.style.top = (enemy.y * 100) + "%";
                        
                        // Если в чите используется инверсия осей, 
                        // возможно потребуется заменить (enemy.y * 100) на (100 - enemy.y * 100)
                        
                        radar.appendChild(dot);
                    });
                    statusText.innerText = `Врагов на радаре: ${data.length}`;
                } else {
                    statusText.innerText = "Ожидание данных из игры...";
                }
            } catch (error) {
                statusText.innerText = "Ошибка: не удалось получить данные";
            }
        }

        // Запрашиваем данные каждые 500мс
        setInterval(fetchRadarData, 500);
        fetchRadarData();
    </script>
</body>
</html>
