<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>larpsense cloud radar</title>
    <style>
        :root { --wm-scale: 0.85; }
        
        body { 
            background-color: #000; color: #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; margin: 0; 
            font-family: 'Verdana', sans-serif; overflow: hidden;
        }

        .settings-btn {
            position: absolute; top: 20px; right: 20px;
            background-color: rgb(17, 17, 17); border: 1px solid rgb(45, 45, 45);
            cursor: pointer; z-index: 10001; 
            width: 28px; height: 28px; border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: background-color 0.2s, border-color 0.2s;
            padding: 0;
        }
        
        .settings-btn svg {
            width: 14px; height: 14px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease, stroke 0.2s;
        }

        .settings-btn:hover { 
            background-color: rgb(25, 25, 25); 
            border-color: rgb(60, 60, 60); 
        }
        
        .settings-btn:hover svg {
            transform: rotate(45deg);
            stroke: #cccccc;
        }

        .settings-panel.active ~ .settings-btn svg {
            transform: rotate(45deg);
            stroke: #ffffff;
        }
        .settings-panel.active ~ .settings-btn {
            background-color: rgb(25, 25, 25);
            border-color: rgb(60, 60, 60);
        }

        .settings-panel {
            position: absolute; top: 58px; right: 20px;
            background-color: rgb(17, 17, 17); border: 1px solid rgb(45, 45, 45);
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 210px; z-index: 10000; display: none; flex-direction: column;
            font-family: 'Verdana', sans-serif; font-size: 11px;
            text-shadow: 1px 1px 0px #000;
            user-select: none;
        }
        .settings-panel.active { display: flex; }

        .settings-content { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

        .skeet-label {
            display: flex; align-items: center; gap: 8px; 
            color: #eeeeee; text-transform: lowercase; cursor: pointer;
        }
        .skeet-label input { display: none; }
        .skeet-checkbox {
            width: 10px; height: 10px; 
            background: rgb(10, 10, 10); border: 1px solid rgb(45, 45, 45);
            border-radius: 2px; position: relative;
            box-sizing: border-box;
        }
        .skeet-label input:checked + .skeet-checkbox {
            background: rgb(100, 100, 100);
            border-radius: 2px;
            border-color: rgb(45, 45, 45);
        }

        .slider-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .slider-title { color: #aaaaaa; text-transform: lowercase; margin-bottom: 2px; }
        
        .slider-container {
            position: relative; width: 100%; height: 11px;
            background: rgb(10, 10, 10); border: 1px solid rgb(45, 45, 45);
            border-radius: 2px;
            display: flex; align-items: center;
            overflow: hidden;
        }
        
        .slider-val {
            position: absolute;
            top: 50%;
            transform: translate(-100%, -50%);
            color: #fff; font-size: 9px; 
            z-index: 5; pointer-events: none;
            letter-spacing: -0.2px;
            padding-right: 4px;
            white-space: nowrap;
        }

        .slider-fill {
            position: absolute; top: 1px; left: 1px; bottom: 1px;
            background: rgb(100, 100, 100);
            width: 0%; z-index: 1; pointer-events: none;
            border-radius: 1px 0 0 1px;
        }
        
        .skeet-slider {
            -webkit-appearance: none; position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; background: transparent; margin: 0; 
            cursor: pointer; z-index: 2;
        }
        .skeet-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 4px; height: 11px; }
        .skeet-slider::-moz-range-thumb { width: 4px; height: 11px; background: transparent; border: none; }

        .wm-container {
            position: absolute; bottom: 20px; left: 50%; 
            transform-origin: bottom center;
            transform: translateX(-50%) scale(var(--wm-scale));
            background-color: rgb(17, 17, 17); border: 1px solid rgb(45, 45, 45);
            padding: 5px 15px; display: flex; align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5); z-index: 10000; border-radius: 2px;
        }
        .wm-text { font-size: 12px; color: #ffffff; white-space: nowrap; font-family: 'Verdana', sans-serif; text-shadow: 1px 1px 0px #000; }
        .divider { color: #444; margin: 0 6px; }
        .stat-online { color: #44ff44; font-weight: bold; }
        .stat-offline { color: #ff4444; font-weight: bold; }
        
        .radar-container { 
            position: relative; width: 65vh; height: 65vh; 
            max-width: 800px; max-height: 800px; min-width: 400px; min-height: 400px;
            background-image: url('https://raw.githubusercontent.com/senselesed/dl-radar/main/map.png');
            background-size: 100% 100%; border-radius: 50%; overflow: hidden;
        }
        .hero-dot {
            position: absolute; border: 2px solid white; border-radius: 50%; 
            transform: translate(-50%, -50%); z-index: 1000; 
            transition: left 0.2s linear, top 0.2s linear;
            background-size: cover; background-color: #111;
        }
        .enemy-dot { border-color: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .ally-dot  { border-color: #44ff44; box-shadow: 0 0 8px #44ff44; }
        .local-dot { border-color: #ffffff; z-index: 1010; border-width: 3px; }
    </style>
</head>
<body>

    <div class="settings-panel" id="settings">
        <div class="settings-content">
            
            <div class="slider-wrapper">
                <div class="slider-title">icon size</div>
                <div class="slider-container">
                    <span class="slider-val" id="wrap-size"><span id="val-size">32</span>px</span>
                    <div class="slider-fill" id="fill-size"></div>
                    <input type="range" id="cfg-size" class="skeet-slider" min="16" max="64" value="32">
                </div>
            </div>
            
            <div class="slider-wrapper">
                <div class="slider-title">watermark scale</div>
                <div class="slider-container">
                    <span class="slider-val" id="wrap-wm"><span id="val-wm">100</span>%</span>
                    <div class="slider-fill" id="fill-wm"></div>
                    <input type="range" id="cfg-wm-scale" class="skeet-slider" min="50" max="150" value="100">
                </div>
            </div>

            <label class="skeet-label"><input type="checkbox" id="cfg-wm" checked><div class="skeet-checkbox"></div>show watermark</label>
            <label class="skeet-label"><input type="checkbox" id="cfg-ping" checked><div class="skeet-checkbox"></div>show ping</label>
            <label class="skeet-label"><input type="checkbox" id="cfg-age" checked><div class="skeet-checkbox"></div>show data age</label>
        </div>
    </div>

    <button class="settings-btn" onclick="document.getElementById('settings').classList.toggle('active')">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <div class="wm-container" id="wm-bar">
        <div class="wm-text" id="wm-content">larpsense <span class="divider">|</span> <span class="stat-offline">OFFLINE</span></div>
    </div>

    <div class="radar-container" id="radar">
        <div id="layer-enemies"></div>
        <div id="layer-allies"></div>
        <div id="layer-local"></div>
    </div>

<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    const CENTER_X = 1230, CENTER_Y = 855, ZOOM = 195;
    const BASE_ICON_URL = "https://raw.githubusercontent.com/senselesed/dl-radar/main/icons/";
    const idToIcon = { 1: "Infernus.png", 2: "Seven.png", 3: "Vindicta.png", 4: "Lady_Geist.png", 6: "Abrams.png", 7: "Wraith.png", 8: "McGinnis.png", 10: "Paradox.png", 11: "Dynamo.png", 12: "Kelvin.png", 13: "Haze.png", 14: "Holliday.png", 15: "Bebop.png", 16: "Calico.png", 17: "Grey_Talon.png", 18: "Mo_&_Krill.png", 19: "Shiv.png", 20: "Ivy.png", 25: "Warden.png", 27: "Yamato.png", 31: "Lash.png", 35: "Viscous.png", 50: "Pocket.png", 52: "Mirage.png", 58: "Vyper.png", 60: "Sinclair.png", 63: "Mina.png", 64: "Drifter.png", 65: "Venator.png", 66: "Victor.png", 67: "Paige.png", 69: "The_Doorman.png", 72: "Billy.png", 76: "Graves.png", 77: "Apollo.png", 79: "Rem.png", 80: "Silver.png", 81: "Celeste.png" };

    let cfg = { size: 32, showWm: true, showPing: true, showAge: true, wmScale: 100 };

    function updateSliderVisual(inputId, fillId, wrapId) {
        const input = document.getElementById(inputId);
        const fill = document.getElementById(fillId);
        const wrap = document.getElementById(wrapId);
        
        const percent = ((input.value - input.min) / (input.max - input.min)) * 100;
        
        fill.style.width = `calc(${percent}% - 2px)`;
        wrap.style.left = `${percent}%`;
        
        if (percent < 25) {
            wrap.style.transform = "translate(4px, -50%)"; 
            wrap.style.left = "0%";
        } else {
            wrap.style.transform = "translate(-100%, -50%)"; 
        }
    }

    function applyAll() {
        document.getElementById('val-size').innerText = cfg.size;
        document.getElementById('val-wm').innerText = cfg.wmScale;
        
        updateSliderVisual('cfg-size', 'fill-size', 'wrap-size');
        updateSliderVisual('cfg-wm-scale', 'fill-wm', 'wrap-wm');

        const finalScale = (cfg.wmScale / 100) * 0.85;
        document.documentElement.style.setProperty('--wm-scale', finalScale);
        
        document.getElementById('wm-bar').style.display = cfg.showWm ? 'flex' : 'none';
        updateIconSizes();
    }

    function save() { localStorage.setItem('larpsense_cfg_v2', JSON.stringify(cfg)); }
    function load() {
        const s = localStorage.getItem('larpsense_cfg_v2');
        if (s) { 
            cfg = JSON.parse(s);
            document.getElementById('cfg-size').value = cfg.size;
            document.getElementById('cfg-wm-scale').value = cfg.wmScale;
            document.getElementById('cfg-wm').checked = cfg.showWm;
            document.getElementById('cfg-ping').checked = cfg.showPing;
            document.getElementById('cfg-age').checked = cfg.showAge;
        }
        applyAll();
    }

    document.getElementById('cfg-size').addEventListener('input', (e) => { cfg.size = e.target.value; applyAll(); });
    document.getElementById('cfg-size').addEventListener('change', save);
    document.getElementById('cfg-wm-scale').addEventListener('input', (e) => { cfg.wmScale = e.target.value; applyAll(); });
    document.getElementById('cfg-wm-scale').addEventListener('change', save);

    document.getElementById('cfg-wm').addEventListener('change', (e) => { cfg.showWm = e.target.checked; applyAll(); save(); });
    document.getElementById('cfg-ping').addEventListener('change', (e) => { cfg.showPing = e.target.checked; save(); });
    document.getElementById('cfg-age').addEventListener('change', (e) => { cfg.showAge = e.target.checked; save(); });

    function calculatePos(gx, gy) {
        const px = 300 + (gx - CENTER_X) / (ZOOM / 300);
        const py = 300 + (gy - CENTER_Y) / (ZOOM / 300);
        return { x: (px / 600) * 100, y: (py / 600) * 100 };
    }

    function updateIconSizes() {
        document.querySelectorAll('.hero-dot').forEach(dot => {
            let s = Number(cfg.size); if (dot.classList.contains('local-dot')) s += 6;
            dot.style.width = s + 'px'; dot.style.height = s + 'px';
        });
    }

    function updateLayer(layerId, data, className, isOnline) {
        const container = document.getElementById(layerId);
        const players = (isOnline && data) ? (Array.isArray(data) ? data : [data]) : [];
        while (container.children.length < players.length) {
            const div = document.createElement("div"); div.className = "hero-dot " + className;
            container.appendChild(div);
        }
        while (container.children.length > players.length) container.lastChild.remove();
        players.forEach((p, i) => {
            const dot = container.children[i]; const pos = calculatePos(p.x, p.y);
            dot.style.left = pos.x + "%"; dot.style.top = pos.y + "%";
            let s = Number(cfg.size); if (className === 'local-dot') s += 6;
            dot.style.width = s + "px"; dot.style.height = s + "px";
            if (p.id && idToIcon[p.id]) dot.style.backgroundImage = `url('${BASE_ICON_URL}${idToIcon[p.id]}')`;
        });
    }

    async function tick() {
        const start = Date.now(); let isOnline = false;
        try {
            const res = await fetch(dbUrl + "?t=" + start);
            const data = await res.json();
            if (data && data.sent_at) {
                const diff = (Math.floor(Date.now() / 1000) - data.sent_at).toFixed(1);
                isOnline = diff < 7;
                const statusHtml = isOnline ? `<span class="stat-online">ONLINE</span>` : `<span class="stat-offline">OFFLINE</span>`;
                let wmText = `larpsense <span class="divider">|</span> ${statusHtml}`;
                if (isOnline) {
                    if (cfg.showPing) wmText += ` <span class="divider">|</span> PING: ${Date.now() - start}ms`;
                    if (cfg.showAge) wmText += ` <span class="divider">|</span> DATA AGE: ${diff}s`;
                }
                document.getElementById("wm-content").innerHTML = wmText;
                const radar = document.getElementById("radar");
                if (isOnline) radar.classList.remove("offline-mode"); else radar.classList.add("offline-mode");
                updateLayer("layer-enemies", data.enemies, "enemy-dot", isOnline);
                updateLayer("layer-allies", data.allies, "ally-dot", isOnline);
                updateLayer("layer-local", data.local, "local-dot", isOnline);
            }
        } catch(e) {}
        setTimeout(tick, isOnline ? 500 : 5000);
    }

    load();
    tick();
</script>
</body>
</html>
