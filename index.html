<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Deadlock Cloud Radar [ALIGN-FIX]</title>
    <style>
        body { background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .radar-container { 
            position: relative; width: 600px; height: 600px; 
            background-color: #1e1e1e; 
            background-image: url('https://deadlock.one/sites/default/files/inline-images/%D0%91%D0%B5%D0%B7%20%D0%B8%D0%BC%D0%B5%D0%BD%D0%B8-2_2.png');
            background-size: 100% 100%; border: 2px solid #444; border-radius: 8px; overflow: hidden; 
        }
        .enemy-dot { 
            position: absolute; width: 14px; height: 14px; background-color: #ff0000; border: 2px solid white; 
            border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px red; z-index: 9999; 
            transition: left 0.2s ease, top 0.2s ease;
        }
        .status { margin-top: 15px; color: #888; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="radar-container" id="radar"></div>
    <div class="status" id="status">Выравнивание...</div>
<script>
    const dbUrl = "https://dl-cloud-radar-default-rtdb.europe-west1.firebasedatabase.app/radar.json";
    
    // --- КОРРЕКТИРОВКА МЕТОК ---
    const VERSION = "ALIGN_V3"; 
    const ZOOM = 210;        // Чуть увеличил зум для точности проходов
    const CENTER_X = 1255;   // Сместил по горизонтали
    const CENTER_Y = 885;    // Сместил по вертикали под метки
    // ---------------------------

    async function fetchRadarData() {
        try {
            const response = await fetch(dbUrl + "?t=" + Date.now());
            const data = await response.json();
            const radar = document.getElementById("radar");
            const statusText = document.getElementById("status");
            
            radar.innerHTML = ""; 
            if (!data) return;

            const enemiesArray = Array.isArray(data) ? data : Object.values(data);
            
            enemiesArray.forEach(enemy => {
                if (enemy && typeof enemy.x === 'number') {
                    const dot = document.createElement("div");
                    dot.className = "enemy-dot";
                    
                    // Расчет с учетом смещения
                    let x_offset_px = (enemy.x - CENTER_X) / (ZOOM / 300);
                    let y_offset_px = (enemy.y - CENTER_Y) / (ZOOM / 300);

                    // Центр 300px + смещение
                    let final_x = 150 + x_offset_px;
                    let final_y = 100 + y_offset_px; // Оставляем инверсию Y

                    dot.style.left = final_x + "px";
                    dot.style.top = final_y + "px";
                    radar.appendChild(dot);
                }
            });
            if (enemiesArray[0]) {
                statusText.innerHTML = `Версия: ${VERSION} | X: ${Math.round(enemiesArray[0].x)} Y: ${Math.round(enemiesArray[0].y)}`;
            }
        } catch (err) { console.error(err); }
    }
    setInterval(fetchRadarData, 500);
    fetchRadarData();
</script>
</body>
</html>
